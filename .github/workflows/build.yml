name: Build and Test PyTorch3D

on:
  workflow_dispatch:
  pull_request:
    branches:
      - qmain
  push:
    branches:
      - qmain

jobs:
  build_wheel_linux:
    runs-on: self-hosted-ubuntu
    env:
      PYTHON_VERSION: "3.12"
      PYTORCH_VERSION: "2.8.0"
      CU_VERSION: "cu128"
      FORCE_CUDA: "1"
      TORCH_CUDA_ARCH_LIST: "8.0;8.6;8.9;9.0"
      CONDA_ENV: "pytorch3d-build"
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup conda environment
      run: |
        # Remove existing env if it exists
        conda env remove -n ${{ env.CONDA_ENV }} || true
        # Create fresh conda environment
        conda create -n ${{ env.CONDA_ENV }} python=${{ env.PYTHON_VERSION }} -y
    
    - name: Install dependencies
      run: |
        source $(conda info --base)/etc/profile.d/conda.sh
        conda activate ${{ env.CONDA_ENV }}
        python -m pip install --upgrade pip
        pip install torch==${{ env.PYTORCH_VERSION }} --index-url https://download.pytorch.org/whl/${{ env.CU_VERSION }}
        pip install setuptools wheel numpy iopath
    
    - name: Build wheel
      run: |
        source $(conda info --base)/etc/profile.d/conda.sh
        conda activate ${{ env.CONDA_ENV }}
        export MAX_JOBS=$(nproc)
        echo "Building with MAX_JOBS=$MAX_JOBS"
        python setup.py clean
        python setup.py bdist_wheel
    
    - name: Upload wheel artifact
      if: github.event_name == 'release' || github.ref == 'refs/heads/qmain'
      uses: actions/upload-artifact@v4
      with:
        name: pytorch3d-wheel-py${{ env.PYTHON_VERSION }}-${{ env.CU_VERSION }}
        path: dist/*.whl
        retention-days: 30
    
    - name: Run basic tests
      run: |
        source $(conda info --base)/etc/profile.d/conda.sh
        conda activate ${{ env.CONDA_ENV }}
        pip install dist/*.whl
        python -c "import pytorch3d; print(f'PyTorch3D version: {pytorch3d.__version__}')"
        python -c "from pytorch3d import transforms; print('Transforms module loaded')"
        python -c "from pytorch3d import structures; print('Structures module loaded')"
    
    - name: Upload wheel to PyPI server
      if: github.event_name == 'release' || github.ref == 'refs/heads/qmain'
      run: |
        # Copy wheel to self-hosted pypiserver
        WHEEL_FILE=$(ls dist/pytorch3d*.whl | head -1)
        echo "Uploading $WHEEL_FILE to pypiserver"
        scp "$WHEEL_FILE" pypi@ci-cd-linux3.quidient.com:/home/pypi/packages/
        echo "Wheel uploaded. Install with:"
        echo "  pip install pytorch3d --index-url http://ci-cd-linux3.quidient.com/pypi/simple/"
    
    - name: Cleanup conda environment
      if: always()
      run: |
        conda env remove -n ${{ env.CONDA_ENV }} || true

  build_wheel_windows:
    runs-on: self-hosted-windows
    env:
      PYTHON_VERSION: "3.12"
      PYTORCH_VERSION: "2.8.0"
      CU_VERSION: "cu128"
      FORCE_CUDA: "1"
      DISTUTILS_USE_SDK: "1"
      TORCH_CUDA_ARCH_LIST: "8.0;8.6;8.9;9.0"
      CONDA_ENV: "pytorch3d-build"
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup conda environment
      shell: pwsh
      run: |
        # Remove existing env if it exists
        conda env remove -n ${{ env.CONDA_ENV }} 2>$null
        # Create fresh conda environment
        conda create -n ${{ env.CONDA_ENV }} python=${{ env.PYTHON_VERSION }} -y
    
    - name: Install dependencies
      shell: pwsh
      run: |
        conda activate ${{ env.CONDA_ENV }}
        python -m pip install --upgrade pip
        pip install torch==${{ env.PYTORCH_VERSION }} --index-url https://download.pytorch.org/whl/${{ env.CU_VERSION }}
        pip install setuptools wheel numpy iopath
    
    - name: Build wheel
      shell: pwsh
      run: |
        # Enter VS Developer Shell for cl.exe discovery
        .\scripts\enter_vs_dev_shell.ps1
        conda activate ${{ env.CONDA_ENV }}
        $env:MAX_JOBS = (Get-CimInstance Win32_ComputerSystem).NumberOfLogicalProcessors
        Write-Host "Building with MAX_JOBS=$env:MAX_JOBS"
        python setup.py clean
        python setup.py bdist_wheel
    
    - name: Upload wheel artifact
      if: github.event_name == 'release' || github.ref == 'refs/heads/qmain'
      uses: actions/upload-artifact@v4
      with:
        name: pytorch3d-wheel-windows-py${{ env.PYTHON_VERSION }}-${{ env.CU_VERSION }}
        path: dist/*.whl
        retention-days: 30
    
    - name: Run basic tests
      shell: pwsh
      run: |
        conda activate ${{ env.CONDA_ENV }}
        pip install (Get-ChildItem dist/*.whl).FullName
        python -c "import pytorch3d; print(f'PyTorch3D version: {pytorch3d.__version__}')"
        python -c "from pytorch3d import transforms; print('Transforms module loaded')"
        python -c "from pytorch3d import structures; print('Structures module loaded')"
    
    - name: Upload wheel to PyPI server
      if: github.event_name == 'release' || github.ref == 'refs/heads/qmain'
      shell: pwsh
      run: |
        # Copy wheel to self-hosted pypiserver
        $WHEEL_FILE = Get-ChildItem dist/pytorch3d*.whl | Select-Object -First 1
        Write-Host "Uploading $WHEEL_FILE to pypiserver"
        scp $WHEEL_FILE.FullName pypi@ci-cd-linux3.quidient.com:/home/pypi/packages/
        Write-Host "Wheel uploaded. Install with:"
        Write-Host "  pip install pytorch3d --index-url http://ci-cd-linux3.quidient.com/pypi/simple/"
    
    - name: Cleanup conda environment
      if: always()
      shell: pwsh
      run: |
        conda env remove -n ${{ env.CONDA_ENV }} 2>$null
